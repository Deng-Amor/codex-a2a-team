<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A2A Agent Office</title><style>
:root{--bg:#eef2f6;--card:#fff;--line:#dbe3ec;--ink:#1d2939;--muted:#778394;--green:#16a36e;--amber:#dd9a21;--blue:#4386ee;--red:#ec7070}*{box-sizing:border-box}body{margin:0;background:var(--bg);font:14px "Microsoft YaHei",system-ui,sans-serif;color:var(--ink);height:100dvh;overflow:hidden}.app{height:100%;display:flex;flex-direction:column}.top{display:flex;align-items:center;gap:25px;padding:13px 24px;background:#fff;border-bottom:1px solid var(--line)}.brand{font-weight:800;white-space:nowrap}.live{display:inline-block;width:10px;height:10px;margin-right:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px #d9f5e9;animation:pulse 1.8s infinite}.task{display:grid;gap:2px;min-width:240px}.label{font-size:10px;letter-spacing:.1em;color:#97a2b1}.task strong{font-size:13px}.metrics{display:flex;gap:22px;margin-left:auto}.metric{text-align:center}.metric b{display:block;font-size:16px}.metric span{font-size:10px;color:#94a0af}.controls{display:flex;gap:8px}.controls select,.controls button{border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:#fff;color:var(--ink)}.controls button{cursor:pointer}.layout{display:grid;grid-template-columns:1fr 355px;min-height:0;flex:1}.floor{position:relative;overflow:hidden;background-color:#f9fbfd;background-image:radial-gradient(#dce4ec 1px,transparent 1px);background-size:22px 22px}.floor-title{position:absolute;top:15px;left:21px;color:#98a4b3;font-size:10px;letter-spacing:.12em;z-index:3}.wire{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.wire line{stroke:#c9d4df;stroke-width:1.3;stroke-dasharray:5 5}.agent{position:absolute;z-index:2;width:184px;border:1px solid var(--line);border-radius:13px;padding:13px;background:#fff;box-shadow:0 2px 7px #26384b12;cursor:pointer;transition:.18s}.agent:hover,.agent.active{transform:translateY(-2px);box-shadow:0 0 0 2px var(--accent),0 12px 25px #26384b22}.agent-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}.avatar{position:relative;display:grid;place-items:center;width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;font-weight:800}.dot{position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border:2px solid #fff;border-radius:50%;background:#a7b2bf}.dot.running{background:var(--green);animation:pulse 1.5s infinite}.dot.waiting{background:var(--amber)}.dot.passed{background:var(--blue)}.dot.failed{background:var(--red)}.name{font-weight:800;font-size:13px}.role{font-size:11px;color:var(--muted)}.work{height:35px;color:var(--muted);font-size:12px;line-height:1.4;overflow:hidden}.bar{height:4px;border-radius:5px;background:#edf1f5;overflow:hidden}.bar i{display:block;width:var(--progress);height:100%;background:var(--accent);transition:.4s}.flow-ball{position:absolute;z-index:5;width:13px;height:13px;border-radius:50%;background:var(--flow);box-shadow:0 0 14px var(--flow);pointer-events:none;animation:fly 1.1s ease-in-out infinite}.legend{position:absolute;bottom:15px;left:20px;z-index:4;display:flex;gap:12px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fffffff0;color:var(--muted);font-size:11px}.legend i{display:inline-block;width:8px;height:8px;margin-right:5px;border-radius:50%}.side{display:flex;min-height:0;flex-direction:column;border-left:1px solid var(--line);background:#fff}.side-head{display:flex;justify-content:space-between;padding:14px 17px;border-bottom:1px solid var(--line);font-weight:800}.feed{overflow:auto;flex:1}.event{padding:12px 17px;border-bottom:1px solid #eff2f5;font-size:12px}.time{color:#a2adba;font:10px ui-monospace,monospace}.route{display:flex;align-items:center;gap:5px;margin:5px 0}.chip{padding:2px 7px;border-radius:9px;color:#fff;font-weight:800;font-size:10px}.arrow{color:#a4afbc}.text{color:#5d6979;line-height:1.45}.empty{padding:55px 22px;color:#9aa5b2;text-align:center;line-height:1.8}.detail{position:absolute;z-index:10;right:20px;bottom:20px;width:270px;padding:15px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 14px 36px #24364c24}.detail.hidden{display:none}.detail h3{margin:0 0 8px;font-size:14px}.detail p{margin:5px 0;color:var(--muted);font-size:12px}.detail button{position:absolute;right:10px;top:10px;border:0;background:none;font-size:20px;color:#94a0af;cursor:pointer}@keyframes pulse{50%{box-shadow:0 0 0 6px #16a36e20}}@keyframes fly{50%{transform:scale(1.4)}}@media(max-width:900px){.layout{grid-template-columns:1fr;grid-template-rows:1fr 230px}.side{border-left:0;border-top:1px solid var(--line)}.metrics{display:none}.agent{width:150px}.top{gap:12px;padding:10px}.task{min-width:0}.controls select{max-width:130px}}
</style><body><div class="app"><header class="top"><div class="brand"><i class="live"></i>A2A Agent Office</div><div class="task"><span class="label">当前确认任务</span><strong id="title">等待 Codex 确认执行</strong></div><div class="metrics"><div class="metric"><b id="steps">0/0</b><span>已完成节点</span></div><div class="metric"><b id="messages">0</b><span>上下文消息</span></div><div class="metric"><b id="state">IDLE</b><span>工作流状态</span></div></div><div class="controls"><select id="workflow"></select><button id="refresh">刷新</button></div></header><main class="layout"><section class="floor"><span class="floor-title">A2A WORKSPACE · 上下文从 agent 到 agent 直接流转</span><svg class="wire" id="wire"></svg><div id="agents"></div><div class="legend"><span><i style="background:#16a36e"></i>执行中</span><span><i style="background:#dd9a21"></i>等待依赖</span><span><i style="background:#4386ee"></i>已交付</span><span><i style="background:#ec7070"></i>阻塞</span></div><aside class="detail hidden" id="detail"></aside></section><aside class="side"><div class="side-head"><span>上下文流转日志</span><span id="event-count">0</span></div><div class="feed" id="feed"><div class="empty">Codex 确认任务后，<br>这里展示每次 A2A 交付与缺陷回派。</div></div></aside></main></div><script>
const meta={"task-decomposer":['任务拆分', '#8b5cf6',6,33],"architecture-agent":['架构设计','#3b82f6',36,10],"product-agent":['产品验收','#e15b93',66,10],"frontend-agent":['前端开发','#16a36e',36,65],"backend-agent":['后端开发','#0d9ab7',66,65],"audit-agent":['代码审计','#dc981f',66,37],"test-agent":['测试验证','#e15b93',6,65],"deployment-agent":['部署发布','#374151',36,37]};let state=null,selected=null;
const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const formatTime=value=>{const d=new Date(value);if(Number.isNaN(d.valueOf()))return '等待时间';const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} / ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`};
const tasks=w=>Object.values(w.tasks);const agentFor=t=>t.agent;const color=a=>meta[a]?.[1]||'#64748b';const pos=a=>meta[a]?.slice(2)||[50,50];
function events(w){const out=[];for(const t of tasks(w)){if(t.result){const next=tasks(w).find(x=>x.dependsOn.includes(t.stage));out.push({at:t.finishedAt||t.startedAt,from:t.agent,to:next?.agent||'archive',text:t.result.summary||t.result.notice||t.status,type:t.status})}}for(const m of state.messages.filter(m=>m.workflowId===w.id))out.push({at:m.createdAt,from:m.from,to:m.to,text:m.type+': '+(m.payload.title||m.payload.reproduction||''),type:m.type});return out.sort((a,b)=>String(b.at).localeCompare(String(a.at)))}
function render(){const workflows=Object.values(state.workflows);const select=document.querySelector('#workflow');select.innerHTML=workflows.map(w=>`<option value="${w.id}">${esc(w.title)} · ${w.status}</option>`).join('');if(!selected||!state.workflows[selected])selected=workflows.at(-1)?.id;select.value=selected;const w=state.workflows[selected];if(!w){return}document.querySelector('#title').textContent=w.title;document.querySelector('#state').textContent=w.status.toUpperCase();const all=tasks(w),done=all.filter(t=>t.status==='passed').length;document.querySelector('#steps').textContent=`${done}/${all.length}`;const ev=events(w);document.querySelector('#messages').textContent=ev.length;document.querySelector('#event-count').textContent=ev.length;renderOffice(w,all);renderFeed(ev)}
function renderOffice(w,all){const host=document.querySelector('#agents');host.innerHTML='';const wire=document.querySelector('#wire');wire.innerHTML='';const rect=document.querySelector('.floor').getBoundingClientRect();wire.setAttribute('viewBox',`0 0 ${rect.width} ${rect.height}`);for(const t of all){const a=agentFor(t),[x,y]=pos(a);const card=document.createElement('article');const status=t.status==='running'?'running':t.status==='passed'?'passed':t.status==='waiting_repair'?'failed':t.status==='ready'?'waiting':'';const progress=t.status==='passed'?'100%':t.status==='running'?'58%':t.status==='waiting_repair'?'82%':'0%';card.className='agent';card.style.cssText=`--accent:${color(a)};--progress:${progress};left:${x}%;top:${y}%`;card.innerHTML=`<div class="agent-head"><div class="avatar">${meta[a]?.[0].slice(0,1)||'A'}<i class="dot ${status}"></i></div><div><div class="name">${esc(meta[a]?.[0]||a)}</div><div class="role">${esc(a)}</div></div></div><div class="work">${esc(t.result?.summary||t.stage+' · '+t.status)}</div><div class="bar"><i></i></div>`;card.onclick=()=>showDetail(t);host.append(card);for(const dep of t.dependsOn){const parent=all.find(x=>x.stage===dep);if(parent){const [px,py]=pos(parent.agent);wire.insertAdjacentHTML('beforeend',`<line x1="${px+8}%" y1="${py+8}%" x2="${x+8}%" y2="${y+8}%"></line>`);if(parent.status==='passed'&&t.status==='running'){const ball=document.createElement('i');ball.className='flow-ball';ball.style.cssText=`--flow:${color(parent.agent)};left:${(px+x)/2+8}%;top:${(py+y)/2+8}%`;host.append(ball)}}}}}
function renderFeed(ev){document.querySelector('#feed').innerHTML=ev.length?ev.map(e=>`<article class="event"><div class="time">${formatTime(e.at)}</div><div class="route"><span class="chip" style="background:${color(e.from)}">${esc(meta[e.from]?.[0]||e.from)}</span><span class="arrow">→</span><span class="chip" style="background:${color(e.to)}">${esc(meta[e.to]?.[0]||e.to)}</span></div><div class="text">${esc(e.text)}</div></article>`).join(''):'<div class="empty">等待 agent 之间产生可追踪的上下文交付。</div>'}
function taskRoute(t){return `/workflow/${selected}/task/${t.id}`}
function showDetail(t,push=true){const d=document.querySelector('#detail'),a=t.agent;if(push)history.pushState({},'',taskRoute(t));d.classList.remove('hidden');d.innerHTML=`<button onclick="history.pushState({},'', '/');this.parentElement.classList.add('hidden')">×</button><h3>${esc(meta[a]?.[0]||a)}</h3><p>Agent ID：${esc(a)}</p><p>Task ID：${esc(t.id)}</p><p>Broker Session：${esc(t.executionId||'早期任务未记录')}</p><p>Codex Session：${esc(t.result?.sessionId||(t.executionId?.startsWith('legacy_')?'本次受控执行，未启动独立 worker':'执行中，等待 worker 返回'))}</p><p>状态：${esc(t.status)}</p><p>产出：${esc(t.result?.summary||'执行中或等待依赖')}</p><a href="${taskRoute(t)}">打开此任务详情链接</a>`}
function routeDetail(){const match=location.pathname.match(/^\/workflow\/([^/]+)\/task\/([^/]+)$/);if(!match)return;selected=match[1];const task=state.workflows[selected]?.tasks;const found=task&&Object.values(task).find(t=>t.id===match[2]);if(found)showDetail(found,false)}
async function load(){state=await fetch('/api/state').then(r=>r.json());render();routeDetail()}document.querySelector('#workflow').onchange=e=>{selected=e.target.value;history.pushState({},'', '/');render()};document.querySelector('#refresh').onclick=load;load();setInterval(load,2000);window.onpopstate=()=>state&&routeDetail();window.onresize=()=>state&&render();
</script><style>.floor.has-detail .agent:not(.active){transform:scale(.84);opacity:.48}.floor.has-detail .agent.active{z-index:12}.detail{right:auto;bottom:auto;width:300px;z-index:20}@media(max-width:900px){.detail{width:min(300px,calc(100% - 24px))}}</style><script>
var detailTaskId=null;
function renderOffice(w,all){const host=document.querySelector('#agents');host.innerHTML='';const wire=document.querySelector('#wire');wire.innerHTML='';const rect=document.querySelector('.floor').getBoundingClientRect();wire.setAttribute('viewBox',`0 0 ${rect.width} ${rect.height}`);for(const t of all){const a=agentFor(t),[x,y]=pos(a);const card=document.createElement('article');const status=t.status==='running'?'running':t.status==='passed'?'passed':t.status==='waiting_repair'?'failed':t.status==='ready'?'waiting':'';const progress=t.status==='passed'?'100%':t.status==='running'?'58%':t.status==='waiting_repair'?'82%':'0%';card.className=`agent${t.id===detailTaskId?' active':''}`;card.dataset.task=t.id;card.style.cssText=`--accent:${color(a)};--progress:${progress};left:${x}%;top:${y}%`;card.innerHTML=`<div class="agent-head"><div class="avatar">${meta[a]?.[0].slice(0,1)||'A'}<i class="dot ${status}"></i></div><div><div class="name">${esc(meta[a]?.[0]||a)}</div><div class="role">${esc(a)}</div></div></div><div class="work">${esc(t.result?.summary||t.stage+' · '+t.status)}</div><div class="bar"><i></i></div>`;card.onclick=()=>showDetail(t,true,card);host.append(card);for(const dep of t.dependsOn){const parent=all.find(x=>x.stage===dep);if(parent){const [px,py]=pos(parent.agent);wire.insertAdjacentHTML('beforeend',`<line x1="${px+8}%" y1="${py+8}%" x2="${x+8}%" y2="${y+8}%"></line>`);if(parent.status==='passed'&&t.status==='running'){const ball=document.createElement('i');ball.className='flow-ball';ball.style.cssText=`--flow:${color(parent.agent)};left:${(px+x)/2+8}%;top:${(py+y)/2+8}%`;host.append(ball)}}}}}
function closeDetail(){detailTaskId=null;history.pushState({},'', '/');document.querySelector('.floor').classList.remove('has-detail');document.querySelector('#detail').classList.add('hidden');document.querySelectorAll('.agent').forEach(x=>x.classList.remove('active'))}
function showDetail(t,push=true,anchor){detailTaskId=t.id;if(push)history.pushState({},'',taskRoute(t));const d=document.querySelector('#detail'),floor=document.querySelector('.floor');anchor||=document.querySelector(`.agent[data-task="${CSS.escape(t.id)}"]`);floor.classList.add('has-detail');document.querySelectorAll('.agent').forEach(x=>x.classList.toggle('active',x===anchor));d.classList.remove('hidden');const a=t.agent;d.innerHTML=`<button onclick="closeDetail()">×</button><h3>${esc(meta[a]?.[0]||a)}</h3><p>Agent ID：${esc(a)}</p><p>Task ID：${esc(t.id)}</p><p>Broker Session：${esc(t.executionId||'早期任务未记录')}</p><p>Codex Session：${esc(t.result?.sessionId||(t.executionId?.startsWith('legacy_')?'本次受控执行，未启动独立 worker':'执行中，等待 worker 返回'))}</p><p>状态：${esc(t.status)}</p><p>产出：${esc(t.result?.summary||'执行中或等待依赖')}</p>`;if(!anchor)return;const base=floor.getBoundingClientRect(),box=anchor.getBoundingClientRect(),width=300;let left=box.right-base.left+14,top=box.top-base.top;if(left+width>base.width-16)left=box.left-base.left-width-14;if(top+230>base.height-16)top=Math.max(16,base.height-246);d.style.left=`${Math.max(16,left)}px`;d.style.top=`${Math.max(16,top)}px`}
function routeDetail(){const match=location.pathname.match(/^\/workflow\/([^/]+)\/task\/([^/]+)$/);if(!match)return closeDetail();selected=match[1];const task=state.workflows[selected]?.tasks;const found=task&&Object.values(task).find(t=>t.id===match[2]);if(found)showDetail(found,false)}
document.querySelector('.floor').addEventListener('click',event=>{const card=event.target.closest('.agent[data-task]');if(!card)return;event.stopPropagation();const task=Object.values(state.workflows[selected].tasks).find(item=>item.id===card.dataset.task);if(task)showDetail(task,true,card)},true);
function bindNodes(){document.querySelectorAll('.agent[data-task]').forEach(card=>card.onclick=event=>{event.stopPropagation();const task=Object.values(state.workflows[selected].tasks).find(item=>item.id===card.dataset.task);if(task)showDetail(task,true,card)})}setInterval(bindNodes,250);bindNodes();
load();
</script></body></html>
